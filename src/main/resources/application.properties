spring.application.name=prueba-tecnica-accenture-back

# ── Local development ─────────────────────────────────────────────────────────
# Loads DB_HOST / DB_PORT / DB_NAME / DB_USER / DB_PASSWORD from the .env file.
# In Docker these same vars are injected by docker-compose as OS env vars, so
# Spring Boot resolves the placeholders below without needing to read any file.
spring.config.import=optional:file:.env[.properties]

logging.level.org.springframework.core.env=DEBUG

# ── Database connection ───────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}?sslmode=require
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=2

# Hibernate settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

